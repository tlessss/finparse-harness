# 营收解析规则 — 精简版（只保留解析器代码真正读取的：认列 / 表类型 / 切桶）
# 依据准则第2号第二十五条：按 行业/产品/地区/销售模式 披露营业收入构成。
# 说明：sections.anchors / find_page / exclude_rows / validate / forbid_as_ratio 已删除——
#       选表已交给 向量召回+锚精判+选表agent，占比不再解析(下游用 金额/锚 算)，这些旋钮无人读取。

revenue_breakdown:
  # ① 表头驱动认列：表头文字 → 语义列（别名）。_resolve_columns 读取。
  header_aliases:
    name:    ["项目", "分行业", "分产品", "分地区", "分销售模式", "营业收入构成"]
    revenue: ["营业收入", "金额", "收入"]
    ratio:   ["占营业收入比重", "营业收入比重", "占营业收入的比重", "占比"]
    cost:    ["营业成本"]
    gross:   ["毛利率"]

  # ② 表语义分类：区分 (A) 占比构成表 与 (B) 毛利率表。header_columns.py 只读 require_any_header。
  table_types:
    composition:                       # (A) 我们要的：含"占营业收入比重"
      require_any_header: ["占营业收入比重", "营业收入比重", "占营业收入的比重", "占比"]
    margin:                            # (B) 避坑：只有毛利率、没有占比
      require_any_header: ["毛利率"]

  # ③ 维度锚点（切桶标记 → 维度）。自愈"改规则"的主要旋钮：
  #    加一种报告写法,往这里加一条即可(parser 直接读 YAML,无需改代码)。
  #    坑:有的报告写"销售模式"(无"分"),漏了会让 直销/经销 串进上一桶(regions翻倍,赛力斯601127踩过)。
  dimensions:
    分行业: industries
    按行业: industries
    分产品: segments
    按产品: segments
    分地区: regions
    按地区: regions
    分销售模式: by_channel
    分销售渠道: by_channel
    销售模式: by_channel
    按销售模式: by_channel
    销售渠道: by_channel
    按销售渠道: by_channel
