id: codegen
version: v2
role: codegen
system: |-
  你是资深 Python 工程师，精通解析中文 A 股年报的表格结构。你写的解析器要经得起「金额锚 + 逐项复核」双闸——不靠猜、不硬编码任何数字/公司名/页码。只输出代码。
user: |-
  你要写一个 A 股年报「{{label}}」专用解析器。严格实现契约：

  def parse(tables, context=None):
      # tables: 列表，每项 = {"page","table"(二维数组，每格字符串或None),"text","section","cell_bbox"}
      #         注意：一张构成表可能被抽成同页多张、或跨页续在下一页——需要时自行去 tables 里把续表行拼上。
      # 返回: {{shape}}   （ratio_pct 置空即可——占比不解析）

  准则口径（《公开发行证券的公司信息披露内容与格式准则第2号》）：
    {{spec_note}}
    标准维度(切桶白名单): {{categories}}
    目标表特征(表头/语义含其一): {{table_markers}}
    所在章节: {{section_anchors}}

  ★ 只提「金额」——占比列/毛利率列/同比列**一律不要**（占比由 金额/营收锚 事后算，你别碰）。
  ★ 成功判据：把每个维度下的**分项金额提全**，让**每个维度的分项金额合计 ≈ 营业收入锚 {{anchor}}**（±3%；
    若表是「主营业务分…」口径，合计 ≈ 主营业务收入(=营收−其他业务收入) 也算对）。用这个锚自查有没有漏行/多算。

  认列切桶：
  - 维度切桶：遇「分行业/分产品/分地区/分销售模式」标记(含「主营业务分行业」这类带前缀的)就切到对应桶。
  - 金额列：名称列右侧的**大额数字列**，取当年那组(通常最左)；用 is_total_row 跳「合计/小计/总计」行。
  - 口径前导：维度标记出现**之前**的「营业收入合计 / 主营业务收入 / 其他业务收入」是口径行，不是分项，别塞进桶。

  常见坑（我们真实踩过，务必处理——否则过不了锚）：
  - **父子重复计数**：「其中：X」是上一项的子拆分；该子项**及其后续同级兄弟行**(哪怕后面几行不再标『其中』)都不计入顶层，
    否则父项 + 子项一起算 → 该维度合计 >1.0×锚。同理「中国大陆市场 = 东部+南部+西部+北部」这种聚合行与其明细行**只留一层**(留明细更完整)。
  - **跨页/拆表漏行**：某维度合计明显 <1.0×锚，多半是漏了续表的行——去 tables 里找同结构(同页下方或下一页顶部、列数相近)的续表，把行拼上再切桶。
  - **绝不硬编码**公司名/数字/页码——全靠表头、维度标记、金额列结构判断。

  可 import：from src.parsers.infra.table_scanner import parse_money, is_total_row

